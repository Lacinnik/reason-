name: Deploy RTE v2 preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview-rte-v2
  cancel-in-progress: true

jobs:
  verify-and-deploy-preview:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/rte-v2'
    environment:
      name: rte-v2-preview
      url: $