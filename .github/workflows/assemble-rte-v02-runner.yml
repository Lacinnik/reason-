name: Assemble RTE v0.2 branch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/rte-v0.2-resonance-memory'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: agent/rte-v0.2-resonance-memory
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct verified source package
        shell: bash
        run: |
          set -euo pipefail
          ls -l .rte-upload
          wc -c .rte-upload/chunk-*
          cat .rte-upload/chunk-* > /tmp/rte-v02.b64
          wc -c /tmp/rte-v02.b64
          base64 --decode /tmp/rte-v02.b64 > /tmp/rte-v02.tar.gz
          wc -c /tmp/rte-v02.tar.gz
          gzip -t /tmp/rte-v02.tar.gz
          tar -tzf /tmp/rte-v02.tar.gz | head -40
          rm -f app.part-*.txt bundle-manifest.txt
          tar -xzf /tmp/rte-v02.tar.gz -C .
          rm -rf .rte-upload
          rm -f .github/workflows/assemble-rte-v02.yml

      - name: Commit assembled package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RTE v0.2 Resonance Memory"
          git push origin HEAD:agent/rte-v0.2-resonance-memory
