name: Assemble RTE v0.2 branch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/rte-v0.2-resonance-memory'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: agent/rte-v0.2-resonance-memory
          fetch-depth: 0
          show-progress: false

      - name: Diagnose package
        shell: bash
        run: |
          set +e
          if [ -f .rte-diagnostic.txt ]; then
            echo "Diagnostic already recorded."
            exit 0
          fi
          {
            echo "FILES"
            ls -l .rte-upload
            echo "CHUNK SIZES"
            wc -c .rte-upload/chunk-*
            cat .rte-upload/chunk-* > /tmp/rte-v02.b64
            echo "BASE64 SIZE"
            wc -c /tmp/rte-v02.b64
            base64 --decode /tmp/rte-v02.b64 > /tmp/rte-v02.tar.gz
            echo "BASE64 STATUS=$?"
            echo "GZIP SIZE"
            wc -c /tmp/rte-v02.tar.gz
            gzip -t /tmp/rte-v02.tar.gz
            echo "GZIP STATUS=$?"
            tar -tzf /tmp/rte-v02.tar.gz
            echo "TAR STATUS=$?"
          } > .rte-diagnostic.txt 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .rte-diagnostic.txt
          git commit -m "Record RTE package diagnostics"
          git push origin HEAD:agent/rte-v0.2-resonance-memory
