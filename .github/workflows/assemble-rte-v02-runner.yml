name: Assemble RTE v0.2 branch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'agent/rte-v0.2-resonance-memory'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: agent/rte-v0.2-resonance-memory
          fetch-depth: 0
          show-progress: false

      - name: Record package hashes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "CHUNK SHA256"
            sha256sum .rte-upload/chunk-*
            cat .rte-upload/chunk-* > /tmp/rte-v02.b64
            echo "BASE64 SHA256"
            sha256sum /tmp/rte-v02.b64
            base64 --decode /tmp/rte-v02.b64 > /tmp/rte-v02.tar.gz
            echo "GZIP SHA256"
            sha256sum /tmp/rte-v02.tar.gz
          } > .rte-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .rte-diagnostic.txt
          git commit -m "Record RTE package hashes"
          git push origin HEAD:agent/rte-v0.2-resonance-memory
