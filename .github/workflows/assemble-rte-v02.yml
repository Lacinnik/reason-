name: Assemble RTE v0.2 package

on:
  push:
    branches:
      - agent/rte-v0.2-resonance-memory
    paths:
      - .rte-upload/**
      - .github/workflows/assemble-rte-v02.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: agent/rte-v0.2-resonance-memory
          fetch-depth: 0

      - name: Reconstruct verified source package
        shell: bash
        run: |
          set -euo pipefail
          cat .rte-upload/chunk-* > /tmp/rte-v02.b64
          base64 --decode /tmp/rte-v02.b64 > /tmp/rte-v02.tar.gz
          tar -xzf /tmp/rte-v02.tar.gz -C .
          rm -rf .rte-upload
          rm -f .github/workflows/assemble-rte-v02.yml

      - name: Commit assembled RTE v0.2
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No assembled changes to commit."
            exit 0
          fi
          git commit -m "RTE v0.2 Resonance Memory"
          git push origin HEAD:agent/rte-v0.2-resonance-memory
