<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Supra Saver" />
  <title>Supra Saver — 6D Geometry Engine</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
    #hud { position: fixed; inset: 0; pointer-events: none; padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left)); display: flex; flex-direction: column; justify-content: space-between; opacity: .92; transition: opacity .6s ease; }
    #hud.hidden { opacity: 0; }
    .brand { letter-spacing: .22em; text-transform: uppercase; font-size: 11px; font-weight: 650; color: rgba(255,255,255,.72); text-shadow: 0 1px 12px #000; }
    .status { align-self: flex-end; text-align: right; font-variant-numeric: tabular-nums; font-size: 11px; line-height: 1.55; color: rgba(255,255,255,.62); text-shadow: 0 1px 12px #000; }
    #start { position: fixed; inset: 0; display: grid; place-items: center; padding: 28px; background: radial-gradient(circle at 50% 42%, rgba(24,36,70,.34), rgba(0,0,0,.94) 68%); }
    #start.hidden { display: none; }
    .panel { width: min(420px, 100%); text-align: center; }
    h1 { margin: 0 0 12px; font-size: clamp(30px, 9vw, 48px); letter-spacing: -.035em; }
    p { margin: 0 auto 26px; max-width: 34ch; color: rgba(255,255,255,.68); line-height: 1.45; font-size: 15px; }
    button { appearance: none; border: 1px solid rgba(255,255,255,.2); color: #fff; background: rgba(255,255,255,.1); backdrop-filter: blur(20px); border-radius: 999px; padding: 14px 24px; font: inherit; font-weight: 650; letter-spacing: .02em; box-shadow: 0 8px 40px rgba(0,0,0,.45); }
    .hint { margin-top: 15px; font-size: 12px; color: rgba(255,255,255,.42); }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud" class="hidden">
  <div class="brand">SUPRA / 5+1 SPACE CONDUCTOR</div>
  <div class="status" id="status">space 01<br>phase 0.000</div>
</div>
<div id="start">
  <div class="panel">
    <h1>Supra Saver</h1>
    <p>Шестимерная геометрия: пять проекционных пространств связаны общей супра‑структурой, шестое измерение управляет переходами между ними.</p>
    <button id="go">Запустить</button>
    <div class="hint">Касание — импульс · движение пальцем — деформация · двойное касание — скрыть интерфейс</div>
  </div>
</div>
<script>
(() => {
  'use strict';
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  const hud = document.getElementById('hud');
  const status = document.getElementById('status');
  const start = document.getElementById('start');
  const go = document.getElementById('go');

  let W = 0, H = 0, DPR = 1, running = false, last = 0, t = 0;
  let pointer = { x: .5, y: .5, down: false, energy: 0 };
  let lastTap = 0;

  const VERTS = [];
  const EDGES = [];
  const dims = 6;

  // 6D hypercube: 64 vertices. The first five axes form the conducted spaces;
  // the sixth axis acts as an autonomous phase/transition dimension.
  for (let i = 0; i < (1 << dims); i++) {
    const v = [];
    for (let d = 0; d < dims; d++) v.push((i & (1 << d)) ? 1 : -1);
    VERTS.push(v);
  }
  for (let i = 0; i < VERTS.length; i++) {
    for (let d = 0; d < dims; d++) {
      const j = i ^ (1 << d);
      if (i < j) EDGES.push([i, j, d]);
    }
  }

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  addEventListener('resize', resize, { passive: true });
  resize();

  function rotateND(v, a, b, angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    const x = v[a], y = v[b];
    v[a] = x * c - y * s;
    v[b] = x * s + y * c;
  }

  function project(v, phase, spaceIndex) {
    const q = v.slice();
    const p = pointer.energy;
    const mx = (pointer.x - .5), my = (pointer.y - .5);

    rotateND(q, 0, 5, phase * .29 + spaceIndex * .37 + mx * p * 1.8);
    rotateND(q, 1, 4, phase * .23 - spaceIndex * .19 + my * p * 1.8);
    rotateND(q, 2, 3, phase * .17 + Math.sin(phase * .13) * .8);
    rotateND(q, 0, 2, phase * .11 + spaceIndex * .43);
    rotateND(q, 1, 3, -phase * .09 + spaceIndex * .31);
    rotateND(q, 4, 5, phase * .07 + Math.cos(phase * .17));

    // 6D -> 5D perspective through autonomous sixth dimension.
    const k6 = 2.8 / (3.6 - q[5]);
    for (let i = 0; i < 5; i++) q[i] *= k6;

    // Select one of five geometrical spaces by cyclic axis coupling.
    const s = spaceIndex % 5;
    const a = q[s];
    const b = q[(s + 1) % 5];
    const c = q[(s + 2) % 5];
    const d = q[(s + 3) % 5];
    const e = q[(s + 4) % 5];

    const x3 = a + .43 * d - .24 * e;
    const y3 = b - .36 * d + .31 * e;
    const z3 = c + .22 * d + .17 * e;
    const k3 = 2.5 / (3.4 - z3);
    return { x: x3 * k3, y: y3 * k3, z: z3, w: q[5], k: k3 };
  }

  function draw(now) {
    if (!running) return;
    const dt = Math.min((now - last) / 1000 || 0, .033);
    last = now;
    t += dt * (.72 + pointer.energy * .5);
    pointer.energy *= Math.pow(.25, dt);

    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, W, H);

    const base = Math.min(W, H) * .185;
    const cx = W * (.5 + (pointer.x - .5) * .035 * pointer.energy);
    const cy = H * (.5 + (pointer.y - .5) * .035 * pointer.energy);
    const activeSpace = Math.floor((t * .13) % 5);

    ctx.globalCompositeOperation = 'lighter';
    for (let layer = 0; layer < 5; layer++) {
      const phaseOffset = layer * Math.PI * 2 / 5;
      const pts = VERTS.map(v => project(v, t + phaseOffset, layer));
      const alphaLayer = .09 + .07 * (1 + Math.sin(t * .9 + phaseOffset));

      for (const [ia, ib, axis] of EDGES) {
        const A = pts[ia], B = pts[ib];
        const depth = Math.max(0, Math.min(1, (A.k + B.k) * .18));
        const sixth = axis === 5;
        const hue = (205 + layer * 31 + axis * 13 + t * 12) % 360;
        const alpha = (sixth ? .24 : alphaLayer) * (.35 + depth);
        ctx.strokeStyle = `hsla(${hue}, 92%, ${sixth ? 76 : 64}%, ${alpha})`;
        ctx.lineWidth = sixth ? 1.4 : .7;
        ctx.beginPath();
        ctx.moveTo(cx + A.x * base, cy + A.y * base);
        ctx.lineTo(cx + B.x * base, cy + B.y * base);
        ctx.stroke();
      }
    }

    // Supra nucleus: independent sixth-space oscillator.
    const pulse = 1 + .14 * Math.sin(t * 2.3);
    const r = base * .055 * pulse + pointer.energy * 10;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 5);
    g.addColorStop(0, 'rgba(255,255,255,.9)');
    g.addColorStop(.15, 'rgba(120,190,255,.5)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r * 5, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    status.innerHTML = `space 0${activeSpace + 1}<br>phase ${(t % (Math.PI * 2)).toFixed(3)}`;
    requestAnimationFrame(draw);
  }

  function locate(e) {
    const p = e.touches ? e.touches[0] : e;
    if (!p) return;
    pointer.x = p.clientX / W;
    pointer.y = p.clientY / H;
  }

  canvas.addEventListener('pointerdown', e => {
    locate(e); pointer.down = true; pointer.energy = 1;
    const now = performance.now();
    if (now - lastTap < 320) hud.classList.toggle('hidden');
    lastTap = now;
  });
  canvas.addEventListener('pointermove', e => {
    locate(e); if (pointer.down) pointer.energy = Math.min(1.5, pointer.energy + .06);
  });
  addEventListener('pointerup', () => pointer.down = false, { passive: true });

  async function enter() {
    start.classList.add('hidden');
    hud.classList.remove('hidden');
    running = true; last = performance.now();
    // Fullscreen is unavailable in some iPhone Safari modes; standalone Home Screen mode is ideal.
    try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (_) {}
    requestAnimationFrame(draw);
  }
  go.addEventListener('click', enter);
})();
</script>
</body>
</html>
